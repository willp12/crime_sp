name: Keep Streamlit alive

on:
  schedule:
    - cron: "0 */8 * * *"  # a cada 8h: 00h, 08h, 16h UTC
  workflow_dispatch:         # permite teste manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://crimesp.streamlit.app/)
          echo "HTTP status: $STATUS"
          # 2xx ou 3xx = servidor respondeu (app vivo ou acordando)
          # 5xx ou falha de conexao = problema real
          if [[ "$STATUS" -ge 500 ]] || [[ "$STATUS" == "000" ]]; then
            echo "ERRO: app retornou status $STATUS"
            exit 1
          fi
