name: Keep Streamlit alive

on:
  schedule:
    - cron: "0 */8 * * *"  # a cada 8h: 00h, 08h, 16h UTC
  workflow_dispatch:         # permite teste manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://crimesp.streamlit.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Aviso: app retornou status $STATUS (pode estar acordando)"
          fi
